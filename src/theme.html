<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Preview</title>
    <link rel="stylesheet" href="./theme.css" />
    <style>
      body {
        background: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-body);
        padding: 2rem;
        margin: 0;
      }
      h1 {
        font-family: var(--font-display);
        color: var(--color-accent-strong);
        margin-bottom: 2rem;
        font-size: var(--font-size-display);
      }
      h2 {
        font-family: var(--font-display);
        font-size: var(--font-size-xxxs);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--color-text-muted);
        border-bottom: 1px solid var(--color-border);
        padding-bottom: 0.4rem;
        margin: 2rem 0 1rem;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
      }
      .var-card {
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 0.6rem 0.8rem;
        min-width: 180px;
        font-size: var(--font-size-caption);
      }
      .var-name {
        color: var(--color-text-muted);
        font-size: var(--font-size-tiny);
        margin-bottom: 0.3rem;
        word-break: break-all;
      }
      .swatch {
        width: 100%;
        height: 36px;
        border-radius: 4px;
        border: 1px solid var(--color-border);
        margin-bottom: 0.3rem;
      }
      .var-value {
        color: var(--color-text-low);
        font-size: var(--font-size-tiny);
      }
      .font-sample {
        font-size: var(--font-size-label);
        color: var(--color-text);
        margin-bottom: 0.2rem;
      }
      .size-sample {
        color: var(--color-text);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h1>Theme Preview</h1>
    <div id="root"></div>

    <script>
      function getVars() {
        const vars = {}
        for (const sheet of document.styleSheets) {
          try {
            for (const rule of sheet.cssRules) {
              if (rule.style) {
                for (const prop of rule.style) {
                  if (prop.trim().startsWith('--')) {
                    vars[prop.trim()] = rule.style
                      .getPropertyValue(prop.trim())
                      .trim()
                  }
                }
              }
            }
          } catch (e) {}
        }
        return vars
      }

      function isColor(name, value) {
        return (
          name.includes('color') ||
          name.includes('accent') ||
          name.includes('bg') ||
          name.includes('border') ||
          name.includes('scrollbar') ||
          name.includes('selected') ||
          name.includes('neutral') ||
          name.includes('highlight') ||
          name.includes('die')
        )
      }

      function isFont(name) {
        return (
          name.includes('font-family') ||
          name.includes('font-body') ||
          name.includes('font-display')
        )
      }
      function isSize(name) {
        return name.includes('font-size') || name.includes('line-height')
      }

      function section(title, html) {
        return `<h2>${title}</h2><div class="grid">${html}</div>`
      }

      function colorCard(name, value) {
        // skip rgb variants as standalone swatches
        if (name.includes('-rgb'))
          return `
        <div class="var-card">
          <div class="var-name">${name}</div>
          <div class="var-value">${value}</div>
        </div>`
        return `
        <div class="var-card">
          <div class="var-name">${name}</div>
          <div class="swatch" style="background:${value}"></div>
          <div class="var-value">${value}</div>
        </div>`
      }

      function fontCard(name, value) {
        return `
        <div class="var-card" style="min-width:260px">
          <div class="var-name">${name}</div>
          <div class="font-sample" style="font-family:${value}">Dawn Blades — The quick brown fox</div>
          <div class="var-value">${value}</div>
        </div>`
      }

      function sizeCard(name, value) {
        return `
        <div class="var-card">
          <div class="var-name">${name}</div>
          <div class="size-sample" style="font-size:${value}">Aa — ${value}</div>
        </div>`
      }

      function otherCard(name, value) {
        return `
        <div class="var-card">
          <div class="var-name">${name}</div>
          <div class="var-value">${value}</div>
        </div>`
      }

      window.addEventListener('load', () => {
        const vars = getVars()
        let colors = '',
          fonts = '',
          sizes = '',
          other = ''

        for (const [name, value] of Object.entries(vars)) {
          if (isFont(name)) fonts += fontCard(name, value)
          else if (isSize(name)) sizes += sizeCard(name, value)
          else if (isColor(name, value)) colors += colorCard(name, value)
          else other += otherCard(name, value)
        }

        document.getElementById('root').innerHTML =
          section('Colors', colors) +
          section('Typography — Fonts', fonts) +
          section('Typography — Sizes', sizes) +
          (other ? section('Other', other) : '')
      })
    </script>
  </body>
</html>
