<svg width="100%" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .coin-bg   { fill: #1a1612; }
      .coin-fg   { fill: none; stroke: #c8a96e; }
      .coin-fill { fill: #c8a96e; stroke: none; }
    </style>
  </defs>

  <!-- Coin background -->
  <circle cx="150" cy="150" r="145" class="coin-bg"/>

  <!-- Outer eye shape (almond) -->
  <path d="M 50,150 Q 150,60 250,150 Q 150,240 50,150 Z" class="coin-bg" stroke="#c8a96e" stroke-width="3"/>

  <!-- Iris -->
  <circle cx="150" cy="150" r="52" class="coin-bg" stroke="#c8a96e" stroke-width="2.5"/>

  <!-- Pupil -->
  <circle cx="150" cy="150" r="26" class="coin-fill"/>

  <!-- Iris detail lines -->
  <line x1="150" y1="98"  x2="150" y2="108" class="coin-fg" stroke-width="1.5"/>
  <line x1="150" y1="192" x2="150" y2="202" class="coin-fg" stroke-width="1.5"/>
  <line x1="98"  y1="150" x2="108" y2="150" class="coin-fg" stroke-width="1.5"/>
  <line x1="192" y1="150" x2="202" y2="150" class="coin-fg" stroke-width="1.5"/>
  <line x1="114" y1="114" x2="121" y2="121" class="coin-fg" stroke-width="1.5"/>
  <line x1="179" y1="179" x2="186" y2="186" class="coin-fg" stroke-width="1.5"/>
  <line x1="186" y1="114" x2="179" y2="121" class="coin-fg" stroke-width="1.5"/>
  <line x1="121" y1="179" x2="114" y2="186" class="coin-fg" stroke-width="1.5"/>

  <!-- Upper eyelid crease -->
  <path d="M 70,135 Q 150,100 230,135" class="coin-fg" stroke-width="1.5" opacity="0.5"/>

  <!-- Highlight glint -->
  <circle cx="168" cy="132" r="7" class="coin-fill" opacity="0.6"/>
  <circle cx="172" cy="128" r="3" fill="#1a1612" opacity="0.8" style="filter: brightness(3)"/>

  <!-- Eyelashes top -->
  <line x1="90"  y1="107" x2="83"  y2="94"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="93"  x2="108" y2="79"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="85"  x2="134" y2="71"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="84"  x2="160" y2="70"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="184" y1="89"  x2="186" y2="75"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="206" y1="101" x2="212" y2="88"  class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="222" y1="118" x2="231" y2="108" class="coin-fg" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Eyelashes bottom -->
  <line x1="95"  y1="193" x2="88"  y2="206" class="coin-fg" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="207" x2="116" y2="221" class="coin-fg" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="150" y1="212" x2="150" y2="226" class="coin-fg" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="180" y1="207" x2="184" y2="221" class="coin-fg" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="205" y1="193" x2="212" y2="205" class="coin-fg" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Coin border -->
  <circle cx="150" cy="150" r="145" class="coin-fg" stroke-width="3"/>
  <circle cx="150" cy="150" r="138" class="coin-fg" stroke-width="1" opacity="0.4"/>
</svg>
