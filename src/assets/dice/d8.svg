<svg width="100%" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
  </defs>

  <!-- Hexagon r=130 centered at 150,150, point top, every 60deg
    1=150,20   (top)
    2=263,85   (upper right)
    3=263,215  (lower right)
    4=150,280  (bottom)
    5=37,215   (lower left)
    6=37,85    (upper left)

    Inner triangle uses vertices 1, 3, 5
    Outer triangles fill gaps using 1-2-3, 3-4-5, 5-6-1 -->

  <!-- Center triangle: 1-3-5 -->
  <polygon points="150,20 263,215 37,215" style="fill:rgb(200, 169, 110);stroke:rgb(26, 22, 18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer triangle top-right: 1-2-3 -->
  <polygon points="150,20 263,85 263,215" style="fill:rgb(138, 104, 48);stroke:rgb(26, 22, 18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer triangle bottom: 3-4-5 -->
  <polygon points="263,215 150,280 37,215" style="fill:rgb(138, 104, 48);stroke:rgb(26, 22, 18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer triangle left: 5-6-1 -->
  <polygon points="37,215 37,85 150,20" style="fill:rgb(138, 104, 48);stroke:rgb(26, 22, 18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>