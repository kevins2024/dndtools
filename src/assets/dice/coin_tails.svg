<svg width="100%" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Coin base -->
  <circle cx="150" cy="150" r="145" fill="#c8a96e"/>

  <!-- Edge darkening -->
  <circle cx="150" cy="150" r="145" fill="#c8a96e" style="filter: brightness(0.6)" opacity="0.4"/>

  <!-- Main highlight sweep upper left -->
  <ellipse cx="115" cy="110" rx="75" ry="55" fill="#c8a96e" style="filter: brightness(1.6)" opacity="0.25" transform="rotate(-30 115 110)"/>

  <!-- Sharp glint streak -->
  <ellipse cx="95" cy="88" rx="32" ry="8" fill="#c8a96e" style="filter: brightness(2)" opacity="0.35" transform="rotate(-40 95 88)"/>

  <!-- Soft secondary highlight lower right -->
  <ellipse cx="195" cy="200" rx="45" ry="25" fill="#c8a96e" style="filter: brightness(1.3)" opacity="0.15" transform="rotate(-30 195 200)"/>

  <!-- Rim glint arc -->
  <path d="M 30,100 Q 60,30 140,18" fill="none" stroke="#c8a96e" stroke-width="4" stroke-linecap="round" style="filter: brightness(2)" opacity="0.4"/>

  <!-- Inner rim shadow -->
  <circle cx="150" cy="150" r="138" fill="none" stroke="#c8a96e" stroke-width="6" style="filter: brightness(0.5)" opacity="0.3"/>

  <!-- Coin border -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#c8a96e" stroke-width="3" style="filter: brightness(0.7)"/>
  <circle cx="150" cy="150" r="138" fill="none" stroke="#c8a96e" stroke-width="1" style="filter: brightness(1.4)" opacity="0.5"/>

  <!-- Specular dot -->
  <circle cx="88" cy="82" r="5" fill="#c8a96e" style="filter: brightness(2.5)" opacity="0.6"/>
</svg>
