  <!-- Face 4: F-D-B-T -->
  <polygon points="225,175 275,175 275,125 150,50" style="fill:rgb(138, 104, 48);stroke:rgb(26, 22, 18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
