<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pile" cx="50%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e9d5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow behind pile -->
  <ellipse cx="14" cy="20" rx="10" ry="5" fill="url(#glow)"/>

  <!-- Dust pile (mound shape) -->
  <ellipse cx="14" cy="20.5" rx="9.5" ry="4" fill="url(#pile)"/>
  <path d="M 4.5,20.5 Q 9,15 14,17 Q 19,15 23.5,20.5" fill="url(#pile)"/>

  <!-- Highlight on pile -->
  <ellipse cx="11" cy="17.5" rx="3" ry="1.2" fill="#e9d5ff" opacity="0.4" transform="rotate(-10,11,17.5)"/>

  <!-- Sparkles (4-pointed stars) -->
  <!-- Top center, large -->
  <path d="M14,3 L14.8,6 L18,7 L14.8,8 L14,11 L13.2,8 L10,7 L13.2,6 Z" fill="#f0abfc" opacity="0.95"/>

  <!-- Upper left -->
  <path d="M6,8 L6.5,10 L8.5,10.5 L6.5,11 L6,13 L5.5,11 L3.5,10.5 L5.5,10 Z" fill="#d8b4fe" opacity="0.85"/>

  <!-- Upper right -->
  <path d="M21,6 L21.4,8 L23.5,8.5 L21.4,9 L21,11 L20.6,9 L18.5,8.5 L20.6,8 Z" fill="#e879f9" opacity="0.9"/>

  <!-- Small dot sparkles -->
  <circle cx="9"  cy="4"  r="1.2" fill="#f5d0fe" opacity="0.8"/>
  <circle cx="23" cy="13" r="0.9" fill="#c084fc" opacity="0.9"/>
  <circle cx="4"  cy="15" r="0.8" fill="#d8b4fe" opacity="0.7"/>
  <circle cx="20" cy="3"  r="0.7" fill="#f0abfc" opacity="0.75"/>
</svg>
