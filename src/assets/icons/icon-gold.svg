<svg viewBox="0 0 32 26" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#7a4800"/>
      <stop offset="25%"  stop-color="#e8a820"/>
      <stop offset="55%"  stop-color="#fdd84a"/>
      <stop offset="80%"  stop-color="#c88010"/>
      <stop offset="100%" stop-color="#7a4800"/>
    </linearGradient>
    <linearGradient id="face" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"   stop-color="#fff0a0"/>
      <stop offset="40%"  stop-color="#fdd84a"/>
      <stop offset="100%" stop-color="#b87010"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"   stop-color="#7a4800" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a2000" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Left stack (4 coins) -->
  <rect x="0" y="12" width="13" height="11" rx="0.5" fill="url(#body)"/>
  <line x1="0"  y1="14.8" x2="13" y2="14.8" stroke="#7a4800" stroke-width="0.7"/>
  <line x1="0"  y1="17.5" x2="13" y2="17.5" stroke="#7a4800" stroke-width="0.7"/>
  <line x1="0"  y1="20.2" x2="13" y2="20.2" stroke="#7a4800" stroke-width="0.7"/>
  <ellipse cx="6.5" cy="23" rx="6.5" ry="2"   fill="url(#shadow)"/>
  <ellipse cx="6.5" cy="12" rx="6.5" ry="2.4" fill="url(#face)"/>
  <ellipse cx="6.5" cy="12" rx="4"   ry="1.2" fill="#fff8c0" opacity="0.35"/>

  <!-- Right stack (7 coins, taller) -->
  <rect x="18" y="4" width="14" height="19" rx="0.5" fill="url(#body)"/>
  <line x1="18" y1="6.7"  x2="32" y2="6.7"  stroke="#7a4800" stroke-width="0.7"/>
  <line x1="18" y1="9.4"  x2="32" y2="9.4"  stroke="#7a4800" stroke-width="0.7"/>
  <line x1="18" y1="12.1" x2="32" y2="12.1" stroke="#7a4800" stroke-width="0.7"/>
  <line x1="18" y1="14.8" x2="32" y2="14.8" stroke="#7a4800" stroke-width="0.7"/>
  <line x1="18" y1="17.5" x2="32" y2="17.5" stroke="#7a4800" stroke-width="0.7"/>
  <line x1="18" y1="20.2" x2="32" y2="20.2" stroke="#7a4800" stroke-width="0.7"/>
  <ellipse cx="25" cy="23" rx="7"   ry="2.2" fill="url(#shadow)"/>
  <ellipse cx="25" cy="4"  rx="7"   ry="2.6" fill="url(#face)"/>
  <ellipse cx="25" cy="4"  rx="4.5" ry="1.4" fill="#fff8c0" opacity="0.35"/>
</svg>
